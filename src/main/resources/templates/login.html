<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - PhoneStore</title>
  <link rel="stylesheet" href="/login.css" />
</head>
<body>

  <div class="page-wrapper">
    <div class="login-card">

      <div class="brand">
        <h1>📱 PhoneStore</h1>
        <p>Chào mừng bạn quay trở lại</p>
      </div>

      <div th:if="${error != null and !#strings.isEmpty(error)}"
           class="error-msg"
           th:text="${error}">
      </div>

      <form action="/login" method="POST">

        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" name="username"
                 placeholder="Nhập tên đăng nhập" required />
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <div class="pwd-wrapper">
            <input type="password" id="password" name="password"
                   placeholder="Nhập mật khẩu" required />
            <button type="button" class="toggle-pwd" onclick="togglePwd()">👁</button>
          </div>
        </div>

        <div class="forgot-row">
          <a href="/forgot-password">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn-login">Đăng nhập</button>

        <p class="signup-row">
          Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
        </p>

      </form>
    </div>
  </div>

  <script>
    // Hiện thông báo lỗi nếu URL có ?error=true
    if (new URLSearchParams(window.location.search).get('error') === 'true') {
      document.getElementById('error-msg').style.display = 'block';
    }

    // Hiện / ẩn mật khẩu
    function togglePwd() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
